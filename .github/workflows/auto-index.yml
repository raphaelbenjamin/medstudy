name: Auto-index new HTML files

on:
  push:
    branches: [main]
    paths:
      - 'anatomy/*.html'
      - 'microbiology/*.html'
      - 'hebrew/*.html'
      - 'italian/*.html'

jobs:
  index:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need parent commit to detect new files

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run auto-indexer
        run: |
          python .github/scripts/auto_index.py
        env:
          REPO_ROOT: ${{ github.workspace }}

      - name: Commit changes (if any)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "auto: index new HTML files [skip ci]"
            git push
          fi
