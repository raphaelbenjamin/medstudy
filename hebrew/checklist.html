<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0b;
  --bg-surface:#111113;
  --bg-hover:#1a1a1e;
  --border:#222228;
  --border-subtle:#18181c;
  --text-primary:#ededef;
  --text-secondary:#8b8b8e;
  --text-tertiary:#5a5a5d;
  --site-accent:#3b82f6;
  --accent-dim:rgba(59,130,246,.12);
  --font-sans:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
html{font-size:15px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--text-primary);font-family:var(--font-sans);
     line-height:1.6;-webkit-font-smoothing:antialiased}

/* ── Layout ── */
.site-layout{display:flex;max-width:1200px;margin:0 auto;min-height:100vh}

/* ── Sidebar ── */
.sidebar{
  width:210px;flex-shrink:0;padding:36px 16px 40px 20px;
  border-right:1px solid var(--border-subtle);
  position:sticky;top:0;height:100vh;overflow-y:auto;
}
.sidebar-logo{
  width:30px;height:30px;border-radius:7px;
  background:linear-gradient(135deg,#3b82f6,#8b5cf6);
  margin-bottom:28px;display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:.8rem;color:#fff;text-decoration:none;flex-shrink:0;
}
.sidebar-logo:hover{opacity:.85;color:#fff}
.nav-section{margin-bottom:20px}
.nav-label{
  font-size:.68rem;font-weight:600;color:var(--text-tertiary);
  text-transform:uppercase;letter-spacing:.09em;
  padding:0 12px;margin-bottom:5px;display:block;
}
.nav-list{list-style:none;display:flex;flex-direction:column;gap:1px}
.nav-list a{
  display:block;padding:6px 12px;border-radius:6px;font-size:.87rem;
  color:var(--text-secondary);transition:background .12s,color .12s;
  text-decoration:none;
}
.nav-list a:hover{background:var(--bg-hover);color:var(--text-primary)}
.nav-list a.active{color:var(--text-primary);background:var(--bg-hover);font-weight:500}

/* TOC */
.sidebar-sep{border:none;border-top:1px solid var(--border-subtle);margin:16px 0 10px}
.toc-heading{
  font-size:.68rem;font-weight:600;color:var(--text-tertiary);
  text-transform:uppercase;letter-spacing:.09em;padding:0 12px;margin-bottom:4px;
}
.toc-list{list-style:none}
.toc-list a{
  display:block;padding:3px 12px;font-size:.76rem;
  color:var(--text-tertiary);border-radius:4px;
  transition:color .12s,background .12s;text-decoration:none;
}
.toc-list a:hover{color:var(--text-secondary);background:var(--bg-hover)}

/* ── Main ── */
.site-main{flex:1;min-width:0;overflow-x:hidden}

/* ── Mobile ── */
@media(max-width:768px){
  .sidebar{display:none}
  .mobile-nav{
    display:flex !important;overflow-x:auto;gap:4px;
    padding:10px 14px;border-bottom:1px solid var(--border);
    -webkit-overflow-scrolling:touch;position:sticky;top:0;
    background:var(--bg);z-index:50;
  }
  .mobile-nav a{
    white-space:nowrap;padding:5px 11px;border-radius:6px;
    font-size:.81rem;color:var(--text-secondary);flex-shrink:0;
    text-decoration:none;
  }
  .mobile-nav a.active{background:var(--bg-hover);color:var(--text-primary)}
}
@media(min-width:769px){.mobile-nav{display:none !important}}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── Dark/light mode tokens injected by patch ── */
:root{--_bg:#0c0c0e;--_bg-h:#1b1b1f;--_bd:#22222a;--_t1:#f0f0f4;--_t2:#8a8a96;--_t3:#50505c}
[data-theme="light"]{--_bg:#f5f5f7;--_bg-h:#eaeaee;--_bd:#dddde8;--_t1:#111118;--_t2:#55555e;--_t3:#9090a0}
html{font-size:16px;scroll-behavior:smooth}
body{line-height:1.65;transition:background .2s,color .2s}

/* ── Overlay ── */
.sb-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.65);z-index:90;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.sb-overlay.open{opacity:1;pointer-events:all}
[data-theme="light"] .sb-overlay{background:rgba(0,0,0,.35)}

/* ── Mobile header ── */
.mob-header{
  display:none;position:sticky;top:0;z-index:80;
  height:52px;padding:0 16px;
  background:var(--bg,var(--bg-deep,#0c0c0e));
  border-bottom:1px solid var(--border-sub,var(--border,#22222a));
  align-items:center;justify-content:space-between;
  transition:background .2s;
}
.mob-logo{
  width:28px;height:28px;border-radius:7px;
  background:linear-gradient(135deg,#3b82f6,#8b5cf6);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:.75rem;color:#fff;text-decoration:none;
}
.mob-right{display:flex;align-items:center;gap:8px}
.mob-theme-btn,.ham-btn{
  width:34px;height:34px;border-radius:8px;
  background:var(--bg-card,var(--bg-s,#141417));
  border:1px solid var(--border,#22222a);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:.9rem;color:inherit;
  transition:background .12s;
}
.mob-theme-btn:hover,.ham-btn:hover{background:var(--bg-hover,var(--bg-h,#1b1b1f))}

/* ── Sidebar theme button ── */
.sb-theme{
  display:flex;align-items:center;gap:8px;
  padding:7px 10px;border-radius:8px;
  font-size:.85rem;color:var(--text-secondary,var(--_t2));
  cursor:pointer;background:none;border:none;
  font-family:inherit;width:100%;
  transition:background .12s,color .12s;
  margin-top:auto;
}
.sb-theme:hover{background:var(--bg-hover,var(--bg-h,#1b1b1f));color:var(--text-primary,var(--_t1))}
.sb-theme-icon{font-size:1rem;line-height:1;width:18px;text-align:center}

/* ── Sidebar open state (mobile) ── */
@media(max-width:820px){
  .sidebar,.sb{
    position:fixed!important;left:0!important;top:0!important;bottom:0!important;
    transform:translateX(-100%);
    transition:transform .25s ease!important;
    z-index:100!important;
  }
  .sidebar.open,.sb.open{transform:translateX(0)!important}
  .sb-overlay{display:block!important}
  .mob-header{display:flex!important}
  .mobile-nav{display:none!important}
}
@media(min-width:821px){
  .mob-header{display:none!important}
  .sb-overlay{display:none!important}
}

</style>
<style>
/* ── Original page styles (scoped to .study-wrap) ── */
.study-wrap {
  width: 100%;
  min-height: 100vh;
}

.study-wrap *{ box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #000;
    --text: #fff;
    --text-checked: #4a4a4a;
    --divider: #222;
    --circle-border: #3a3a3a;
    --check-fill: #ffd60a;
    --keyword: #5ac8fa;
    --trans: #666;
    --header-bg: rgba(0,0,0,0.9);
  }

  html, .study-wrap{
    background: var(--bg);
    color: var(--text);
    font-family: 'Arial Hebrew', Arial, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* Header */
  .header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--header-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--divider);
    padding: 18px 20px 0;
  }

  .header-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 14px;
    direction: ltr;
  }

  .title {
    font-family: 'Arial Hebrew', Arial, sans-serif;
    font-size: 0.85rem;
    font-weight: 400;
    color: #555;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .count {
    font-family: 'Arial Hebrew', Arial, sans-serif;
    font-size: 0.75rem;
    color: #3a3a3a;
  }

  .filters {
    display: flex;
    direction: ltr;
    border-bottom: none;
  }

  .ftab {
    flex: 1;
    text-align: center;
    padding: 8px 0 10px;
    font-family: 'Arial Hebrew', Arial, sans-serif;
    font-size: 0.8rem;
    font-weight: 400;
    color: #3a3a3a;
    background: none;
    border: none;
    border-bottom: 1.5px solid transparent;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
    letter-spacing: 0.02em;
  }
  .ftab.active { color: #ffd60a; border-bottom-color: #ffd60a; }

  /* List */
  .list { padding-bottom: 80px; }

  .row {
    display: flex;
    align-items: center;
    padding: 0 20px;
    border-bottom: 1px solid var(--divider);
    min-height: 50px;
    gap: 16px;
    cursor: pointer;
    user-select: text;
    -webkit-user-select: text;
  }

  /* Circle — physically rightmost for right thumb */
  .circle {
    flex-shrink: 0;
    order: 1;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 1.5px solid var(--circle-border);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s;
  }

  .row.checked .circle {
    background: var(--check-fill);
    border-color: var(--check-fill);
  }

  .ck { display: none; }
  .row.checked .ck { display: block; }

  /* Info dot */
  .idot {
    flex-shrink: 0;
    order: 3;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #181818;
    border: none;
    color: #3a3a3a;
    font-size: 0.6rem;
    font-family: 'Arial Hebrew', Arial, sans-serif;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.12s, color 0.12s;
    flex-shrink: 0;
    line-height: 1;
  }
  .idot.open { background: #5ac8fa22; color: #5ac8fa; }

  /* Content */
  .content {
    flex: 1;
    order: 2;
    padding: 13px 0;
  }

  .sentence {
    font-family: 'Arial Hebrew', Arial, sans-serif;
    font-size: 1.05rem;
    font-weight: 300;
    line-height: 1.5;
    color: var(--text);
    direction: rtl;
    text-align: right;
    transition: color 0.2s;
  }

  .row.checked .sentence {
    color: var(--text-checked);
  }

  .keyword { color: var(--keyword); font-weight: 400; }
  .row.checked .keyword { color: #2a4a55; }

  .trans {
    font-family: 'Arial Hebrew', Arial, sans-serif;
    font-size: 0.78rem;
    font-weight: 300;
    color: var(--trans);
    direction: ltr;
    text-align: left;
    margin-top: 4px;
    display: none;
    font-style: italic;
  }
  .trans.open { display: block; }

  /* Empty */
  .empty {
    display: none;
    text-align: center;
    padding: 80px 32px;
    color: #333;
    font-family: 'Arial Hebrew', Arial, sans-serif;
    font-size: 0.9rem;
    direction: ltr;
  }
  .empty.show { display: block; }

  /* Bottom */
  .bottom {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.92);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--divider);
    padding: 10px 20px 22px;
    display: flex;
    gap: 8px;
    justify-content: center;
    direction: ltr;
  }

  .cbtn {
    font-family: 'Arial Hebrew', Arial, sans-serif;
    font-size: 0.75rem;
    color: #3a3a3a;
    background: none;
    border: 1px solid #222;
    padding: 6px 14px;
    border-radius: 14px;
    cursor: pointer;
    transition: color 0.12s, border-color 0.12s;
  }
  .cbtn:hover { color: #666; border-color: #3a3a3a; }
  .cbtn.ok { color: #34c759; border-color: #34c759; }

  .rbtn {
    font-family: 'Arial Hebrew', Arial, sans-serif;
    font-size: 0.75rem;
    color: #2a2a2a;
    background: none;
    border: none;
    padding: 6px 10px;
    cursor: pointer;
    transition: color 0.12s;
  }
  .rbtn:hover { color: #ff453a; }

</style>
</head>

let checked = {}, filter = 'all', openT = {};

function save() {
  try {
    // Encode checked IDs as compact comma-separated string
    const ids = Object.keys(checked).filter(k => checked[k]).join(',');
    // Save to localStorage
    localStorage.setItem('hv_ids', ids);
    // Also encode into URL hash so it survives app restarts
    history.replaceState(null, '', ids ? '#' + ids : '#');
  } catch(e) {}
}

function load() {
  try {
    // Try URL hash first (most reliable on mobile after app close)
    let ids = '';
    if (location.hash && location.hash.length > 1) {
      ids = decodeURIComponent(location.hash.slice(1));
    } else {
      // Fall back to localStorage
      ids = localStorage.getItem('hv_ids') || '';
    }
    if (ids) {
      ids.split(',').forEach(id => { if (id) checked[parseInt(id)] = true; });
    }
  } catch(e) {}
}

function rows() {
  if (filter === 'known') return S.filter(s => checked[s[0]]);
  if (filter === 'unseen') return S.filter(s => !checked[s[0]]);
  return S;
}

function render() {
  const list = document.getElementById('list');
  const empty = document.getElementById('empty');
  const data = rows();

  if (!data.length) {
    list.innerHTML = '';
    empty.classList.add('show');
  } else {
    empty.classList.remove('show');
    list.innerHTML = data.map(s => {
      const [id,,text,tr] = s;
      const c = !!checked[id], o = !!openT[id];
      return `<div class="row${c?' checked':''}" id="r${id}">
        <div class="content" onclick="tog(${id})">
          <div class="sentence">${kw(text)}</div>
          <div class="trans${o?' open':''}" id="t${id}">${tr}</div>
        </div>
        <button class="idot${o?' open':''}" id="d${id}" onclick="togT(event,${id})">${o?'×':'i'}</button>
        <div class="circle" onclick="tog(${id})">
          <svg class="ck" width="13" height="10" viewBox="0 0 13 10" fill="none">
            <path d="M1.5 5L5 8.5L11.5 1.5" stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>`;
    }).join('');
  }
  upd();
}

function upd() {
  const cnt = Object.values(checked).filter(Boolean).length;
  document.getElementById('hcount').textContent = `${cnt} / ${S.length}`;
}

function tog(id) {
  checked[id] = !checked[id];
  save();
  if (filter !== 'all') { setTimeout(render, 220); return; }
  const r = document.getElementById('r'+id);
  if (r) r.classList.toggle('checked', !!checked[id]);
  upd();
}

function togT(e, id) {
  e.stopPropagation();
  openT[id] = !openT[id];
  const t = document.getElementById('t'+id);
  const d = document.getElementById('d'+id);
  t && t.classList.toggle('open', !!openT[id]);
  if (d) { d.classList.toggle('open', !!openT[id]); d.textContent = openT[id]?'×':'i'; }
}

function setFilter(f, el) {
  filter = f;
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function doReset() {
  if (confirm('Reset all progress?')) {
    checked = {};
    try { localStorage.removeItem('hv_ids'); } catch(e) {}
    history.replaceState(null, '', '#');
    render();
  }
}

function copyAll() {
  const t = S.map(s => s[2].replace(/<k>(.*?)<\/k>/g,'$1')).join('\n');
  navigator.clipboard.writeText(t).then(() => flash('ca','Copied ✓','Copy all'));
}

function copyUnchecked() {
  const t = S.filter(s=>!checked[s[0]]).map(s=>s[2].replace(/<k>(.*?)<\/k>/g,'$1')).join('\n');
  navigator.clipboard.writeText(t).then(() => flash('cu','Copied ✓','Copy unchecked'));
}

function flash(id, on, off) {
  const b = document.getElementById(id);
  b.textContent = on; b.classList.add('ok');
  setTimeout(()=>{ b.textContent=off; b.classList.remove('ok'); }, 2000);
}

function toggleAllTrans() {
  const allOpen = S.every(s => openT[s[0]]);
  S.forEach(s => { openT[s[0]] = !allOpen; });
  const btn = document.getElementById('showall-btn');
  if (btn) btn.textContent = allOpen ? 'Show translations' : 'Hide translations';
  render();
}

load(); render();

let checked = {}, filter = 'all', openT = {};

function save() {
  try {
    // Encode checked IDs as compact comma-separated string
    const ids = Object.keys(checked).filter(k => checked[k]).join(',');
    // Save to localStorage
    localStorage.setItem('hv_ids', ids);
    // Also encode into URL hash so it survives app restarts
    history.replaceState(null, '', ids ? '#' + ids : '#');
  } catch(e) {}
}

function load() {
  try {
    // Try URL hash first (most reliable on mobile after app close)
    let ids = '';
    if (location.hash && location.hash.length > 1) {
      ids = decodeURIComponent(location.hash.slice(1));
    } else {
      // Fall back to localStorage
      ids = localStorage.getItem('hv_ids') || '';
    }
    if (ids) {
      ids.split(',').forEach(id => { if (id) checked[parseInt(id)] = true; });
    }
  } catch(e) {}
}

function kw(t) { return t.replace(/<k>(.*?)<\/k>/g, '<span class="keyword">$1</span>'); }

function rows() {
  if (filter === 'known') return S.filter(s => checked[s[0]]);
  if (filter === 'unseen') return S.filter(s => !checked[s[0]]);
  return S;
}

function render() {
  const list = document.getElementById('list');
  const empty = document.getElementById('empty');
  const data = rows();

  if (!data.length) {
    list.innerHTML = '';
    empty.classList.add('show');
  } else {
    empty.classList.remove('show');
    list.innerHTML = data.map(s => {
      const [id,,text,tr] = s;
      const c = !!checked[id], o = !!openT[id];
      return `<div class="row${c?' checked':''}" id="r${id}">
        <div class="content" onclick="tog(${id})">
          <div class="sentence">${kw(text)}</div>
          <div class="trans${o?' open':''}" id="t${id}">${tr}</div>
        </div>
        <button class="idot${o?' open':''}" id="d${id}" onclick="togT(event,${id})">${o?'×':'i'}</button>
        <div class="circle" onclick="tog(${id})">
          <svg class="ck" width="13" height="10" viewBox="0 0 13 10" fill="none">
            <path d="M1.5 5L5 8.5L11.5 1.5" stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>`;
    }).join('');
  }
  upd();
}

function upd() {
  const cnt = Object.values(checked).filter(Boolean).length;
  document.getElementById('hcount').textContent = `${cnt} / ${S.length}`;
}

function tog(id) {
  checked[id] = !checked[id];
  save();
  if (filter !== 'all') { setTimeout(render, 220); return; }
  const r = document.getElementById('r'+id);
  if (r) r.classList.toggle('checked', !!checked[id]);
  upd();
}

function togT(e, id) {
  e.stopPropagation();
  openT[id] = !openT[id];
  const t = document.getElementById('t'+id);
  const d = document.getElementById('d'+id);
  t && t.classList.toggle('open', !!openT[id]);
  if (d) { d.classList.toggle('open', !!openT[id]); d.textContent = openT[id]?'×':'i'; }
}

function setFilter(f, el) {
  filter = f;
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function doReset() {
  if (confirm('Reset all progress?')) {
    checked = {};
    try { localStorage.removeItem('hv_ids'); } catch(e) {}
    history.replaceState(null, '', '#');
    render();
  }
}

function copyAll() {
  const t = S.map(s => s[2].replace(/<k>(.*?)<\/k>/g,'$1')).join('\n');
  navigator.clipboard.writeText(t).then(() => flash('ca','Copied ✓','Copy all'));
}

function copyUnchecked() {
  const t = S.filter(s=>!checked[s[0]]).map(s=>s[2].replace(/<k>(.*?)<\/k>/g,'$1')).join('\n');
  navigator.clipboard.writeText(t).then(() => flash('cu','Copied ✓','Copy unchecked'));
}

function flash(id, on, off) {
  const b = document.getElementById(id);
  b.textContent = on; b.classList.add('ok');
  setTimeout(()=>{ b.textContent=off; b.classList.remove('ok'); }, 2000);
}

function toggleAllTrans() {
  const allOpen = S.every(s => openT[s[0]]);
  S.forEach(s => { openT[s[0]] = !allOpen; });
  const btn = document.getElementById('showall-btn');
  if (btn) btn.textContent = allOpen ? 'Show translations' : 'Hide translations';
  render();
}

load(); render();
</script>
<script>
(function(){
  var root=document.documentElement;
  var saved=localStorage.getItem('msTheme')||'dark';
  root.dataset.theme=saved;
  function updateIcons(){
    var isDark=root.dataset.theme==='dark';
    document.querySelectorAll('.sb-theme-icon,.mob-theme-icon').forEach(function(el){
      el.textContent=isDark?'☀':'🌙';
    });
  }
  window.toggleTheme=function(){
    root.dataset.theme=root.dataset.theme==='dark'?'light':'dark';
    localStorage.setItem('msTheme',root.dataset.theme);
    updateIcons();
  };
  // Run immediately (before DOM ready) so no flash
  updateIcons();
  window.addEventListener('DOMContentLoaded',function(){
    updateIcons();
    var sb=document.querySelector('.sidebar,.sb');
    var overlay=document.querySelector('.sb-overlay');
    var hamBtn=document.querySelector('.ham-btn');
    if(!sb||!overlay||!hamBtn)return;
    function openSb(){sb.classList.add('open');overlay.classList.add('open');}
    function closeSb(){sb.classList.remove('open');overlay.classList.remove('open');}
    hamBtn.addEventListener('click',function(){
      sb.classList.contains('open')?closeSb():openSb();
    });
    overlay.addEventListener('click',closeSb);
    document.querySelectorAll('.sidebar a,.sb a').forEach(function(a){
      a.addEventListener('click',closeSb);
    });
  });
})();
</script>
