<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English–Hebrew Sentence Patterns</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222;
    --border: #2e2e2e;
    --accent: #c8a96e;
    --accent2: #7dbfb2;
    --text: #e8e2d9;
    --text-dim: #888;
    --text-faint: #555;
    --copy-ok: #6fcf97;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 300;
    line-height: 1.6;
    min-height: 100vh;
  }

  header {
    padding: 3rem 2rem 2rem;
    max-width: 960px;
    margin: 0 auto;
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    color: var(--accent);
    letter-spacing: 0.01em;
  }

  header p {
    margin-top: 0.6rem;
    color: var(--text-dim);
    font-size: 0.9rem;
    max-width: 600px;
  }

  .toc {
    max-width: 960px;
    margin: 2rem auto;
    padding: 0 2rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .toc a {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-dim);
    text-decoration: none;
    border: 1px solid var(--border);
    padding: 0.25rem 0.55rem;
    border-radius: 3px;
    transition: all 0.15s;
  }

  .toc a:hover {
    color: var(--accent);
    border-color: var(--accent);
  }

  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 1rem 2rem 4rem;
  }

  .section {
    margin-bottom: 2.5rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .section-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
    padding: 1.2rem 1.4rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .section-meta {
    flex: 1;
  }

  .section-number {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    color: var(--text);
    font-weight: 600;
  }

  .section-desc {
    margin-top: 0.5rem;
    font-size: 0.82rem;
    color: var(--text-dim);
    font-style: italic;
    max-width: 600px;
  }

  .copy-btn {
    flex-shrink: 0;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 0.35rem 0.75rem;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    margin-top: 0.2rem;
  }

  .copy-btn:hover {
    color: var(--accent2);
    border-color: var(--accent2);
  }

  .copy-btn.copied {
    color: var(--copy-ok);
    border-color: var(--copy-ok);
  }

  .subsection {
    border-top: 1px solid var(--border);
  }

  .subsection-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.7rem 1.4rem;
    background: #161616;
  }

  .subsection-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent2);
    letter-spacing: 0.05em;
  }

  .pair-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  .pair-row {
    display: contents;
  }

  .pair-row:hover .cell {
    background: #1e1e1e;
  }

  .cell {
    padding: 0.55rem 1.4rem;
    font-size: 0.85rem;
    border-bottom: 1px solid #1d1d1d;
    transition: background 0.1s;
  }

  .cell.en {
    color: var(--text);
    border-right: 1px solid var(--border);
  }

  .cell.he {
    color: var(--accent);
    direction: rtl;
    font-size: 0.88rem;
  }

  .col-headers {
    display: grid;
    grid-template-columns: 1fr 1fr;
    background: #161616;
    border-bottom: 1px solid var(--border);
  }

  .col-h {
    padding: 0.4rem 1.4rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-faint);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .col-h:first-child { border-right: 1px solid var(--border); }

  @media (max-width: 600px) {
    .pair-grid { grid-template-columns: 1fr; }
    .col-headers { grid-template-columns: 1fr; }
    .cell.en { border-right: none; }
    .col-h:first-child { border-right: none; }
  }
</style>
</head>

// Build TOC
const toc = document.getElementById('toc');
data.forEach(sec => {
  const a = document.createElement('a');
  a.href = `#${sec.id}`;
  a.textContent = `${sec.num}. ${sec.title.split('—')[0].split('—')[0].trim()}`;
  toc.appendChild(a);
});

// Build sections
const main = document.getElementById('main');

function sectionText(sec) {
  let lines = [sec.title, '', sec.desc, ''];
  sec.subsections.forEach(sub => {
    if (sub.title) lines.push(`[${sub.title}]`, '');
    sub.pairs.forEach(([en, he]) => lines.push(`${en} | ${he}`));
    lines.push('');
  });
  return lines.join('\n').trim();
}

function subsectionText(sub) {
  return sub.pairs.map(([en, he]) => `${en} | ${he}`).join('\n');
}

data.forEach(sec => {
  const div = document.createElement('div');
  div.className = 'section';
  div.id = sec.id;

  const hdr = document.createElement('div');
  hdr.className = 'section-header';

  const meta = document.createElement('div');
  meta.className = 'section-meta';
  meta.innerHTML = `<div class="section-number">§ ${sec.num}</div>
    <div class="section-title">${sec.title}</div>
    <div class="section-desc">${sec.desc}</div>`;

  const btn = document.createElement('button');
  btn.className = 'copy-btn';
  btn.textContent = 'Copy all';
  btn.addEventListener('click', () => {
    navigator.clipboard.writeText(sectionText(sec)).then(() => {
      btn.textContent = '✓ Copied';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy all'; btn.classList.remove('copied'); }, 1800);
    });
  });

  hdr.appendChild(meta);
  hdr.appendChild(btn);
  div.appendChild(hdr);

  sec.subsections.forEach(sub => {
    const subDiv = document.createElement('div');
    subDiv.className = 'subsection';

    if (sub.title || sec.subsections.length > 1) {
      const subHdr = document.createElement('div');
      subHdr.className = 'subsection-header';
      const subTitle = document.createElement('span');
      subTitle.className = 'subsection-title';
      subTitle.textContent = sub.title || '';
      const subBtn = document.createElement('button');
      subBtn.className = 'copy-btn';
      subBtn.textContent = 'Copy';
      subBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(subsectionText(sub)).then(() => {
          subBtn.textContent = '✓ Copied';
          subBtn.classList.add('copied');
          setTimeout(() => { subBtn.textContent = 'Copy'; subBtn.classList.remove('copied'); }, 1800);
        });
      });
      subHdr.appendChild(subTitle);
      subHdr.appendChild(subBtn);
      subDiv.appendChild(subHdr);
    }

    const colHdrs = document.createElement('div');
    colHdrs.className = 'col-headers';
    colHdrs.innerHTML = '<div class="col-h">English</div><div class="col-h">Hebrew עברית</div>';
    subDiv.appendChild(colHdrs);

    const grid = document.createElement('div');
    grid.className = 'pair-grid';

    sub.pairs.forEach(([en, he]) => {
      const row = document.createElement('div');
      row.className = 'pair-row';
      const enCell = document.createElement('div');
      enCell.className = 'cell en';
      enCell.textContent = en;
      const heCell = document.createElement('div');
      heCell.className = 'cell he';
      heCell.textContent = he;
      row.appendChild(enCell);
      row.appendChild(heCell);
      grid.appendChild(row);
    });

    subDiv.appendChild(grid);
    div.appendChild(subDiv);
  });

  main.appendChild(div);
});
