<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hebrew Vocab</title>

<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#101010;--surface:#1a1a1a;--surface-2:#222;--surface-3:#2a2a2a;
    --text:#f0f0f0;--text-dim:#aaa;--text-muted:#666;
    --accent:#f5c518;--accent-dim:rgba(245,197,24,0.1);
    --green:#34d399;
    --border:rgba(255,255,255,0.06);--border-light:rgba(255,255,255,0.1);
    --radius:10px;
    --font:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display','Helvetica Neue',system-ui,sans-serif;
  }
  html,body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  .header{position:sticky;top:0;z-index:50;background:rgba(16,16,16,0.85);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:14px 18px 0}
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;direction:ltr}
  .logo{display:flex;align-items:center;gap:7px}
  .logo-mark{width:26px;height:26px;border-radius:6px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-family:var(--font);font-size:0.8rem;font-weight:700;color:#000;line-height:1}
  .logo-text{font-size:0.72rem;font-weight:500;color:var(--text-muted);letter-spacing:0.06em;text-transform:uppercase}
  .header-actions{display:flex;align-items:center;gap:5px;direction:ltr}
  .h-btn{font-family:var(--font);font-size:0.66rem;font-weight:500;color:var(--text-muted);background:transparent;border:1px solid var(--border-light);padding:4px 10px;border-radius:16px;cursor:pointer;transition:color 0.15s,border-color 0.15s;white-space:nowrap}
  @media(hover:hover){.h-btn:hover{color:var(--text-dim);border-color:rgba(255,255,255,0.15)}}
  .h-btn:active{transform:scale(0.96)}
  .h-btn.flash{color:var(--green);border-color:var(--green)}
  .counter{font-family:var(--font);font-size:0.68rem;font-weight:400;color:var(--text-muted);margin-left:2px;white-space:nowrap}
  .progress-wrap{padding:0 0 10px;direction:ltr}
  .progress-bar{height:2px;background:rgba(255,255,255,0.04);border-radius:1px;overflow:hidden}
  .progress-fill{height:100%;background:var(--accent);border-radius:1px;transition:width 0.4s cubic-bezier(0.22,1,0.36,1)}
  .filters{display:flex;direction:ltr;gap:0}
  .ftab{flex:1;text-align:center;padding:8px 0 10px;font-family:var(--font);font-size:0.72rem;font-weight:500;color:var(--text-muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:color 0.15s,border-color 0.15s}
  @media(hover:hover){.ftab:hover{color:var(--text-dim)}}
  .ftab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .search-wrap{padding:10px 18px 0;direction:ltr}
  .search-box{width:100%;font-family:var(--font);font-size:0.82rem;font-weight:400;color:var(--text);background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius);padding:9px 14px 9px 34px;outline:none;transition:border-color 0.2s}
  .search-box::placeholder{color:var(--text-muted)}
  .search-box:focus{border-color:rgba(255,255,255,0.18)}
  .search-container{position:relative}
  .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none}
  .search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--surface-2);border:none;color:var(--text-muted);width:20px;height:20px;border-radius:50%;cursor:pointer;display:none;align-items:center;justify-content:center;font-size:0.6rem;line-height:1}
  .search-clear.show{display:flex}
  .list{padding:2px 0 90px}
  .item{border-bottom:1px solid var(--border)}
  .item.checked{opacity:0.4}
  .item.checked .word{text-decoration:line-through;text-decoration-color:var(--text-muted);text-underline-offset:3px}
  .row{display:flex;align-items:center;padding:0 18px;min-height:54px;gap:8px;direction:rtl}
  .expand-btn{flex-shrink:0;width:30px;height:30px;border-radius:50%;background:transparent;border:1px solid var(--border-light);color:var(--text-muted);font-size:0.55rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.25s cubic-bezier(0.22,1,0.36,1),color 0.15s,background 0.15s,border-color 0.15s}
  @media(hover:hover){.expand-btn:hover{background:rgba(255,255,255,0.04);color:var(--text-dim)}}
  .expand-btn:active{transform:scale(0.9)}
  .expand-btn.open{color:var(--accent);border-color:rgba(245,197,24,0.25);background:rgba(245,197,24,0.06);transform:rotate(180deg)}
  .word-area{flex:1;padding:13px 0;display:flex;align-items:baseline;gap:8px;direction:rtl;min-width:0;cursor:pointer}
  .word{font-family:var(--font);font-size:1.2rem;font-weight:500;color:var(--text);line-height:1.35;transition:color 0.2s}
  .pos-tag{font-family:var(--font);font-size:0.62rem;font-weight:400;color:var(--text-muted);direction:ltr;white-space:nowrap;flex-shrink:0}
  .circle{flex-shrink:0;width:30px;height:30px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s cubic-bezier(0.22,1,0.36,1);-webkit-user-select:none;user-select:none;background:transparent}
  @media(hover:hover){.circle:hover{border-color:var(--accent);background:var(--accent-dim)}}
  .circle:active{transform:scale(0.85)}
  .item.checked .circle{background:var(--accent);border-color:var(--accent)}
  .ck{display:none}
  .item.checked .ck{display:block}
  .detail{overflow:hidden;max-height:0;opacity:0;transition:max-height 0.3s cubic-bezier(0.22,1,0.36,1),opacity 0.2s}
  .detail.open{max-height:180px;opacity:1}
  .detail-inner{padding:0 18px 14px;direction:ltr}
  .detail-card{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius);padding:12px 14px;display:flex;flex-direction:column;gap:8px}
  .d-row{display:flex;gap:8px;align-items:baseline}
  .d-label{font-family:var(--font);font-size:0.6rem;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;min-width:54px;flex-shrink:0}
  .d-val{font-family:var(--font);font-size:0.82rem;color:var(--text-dim);line-height:1.5;direction:rtl;text-align:right}
  .d-val.meaning{color:var(--text);font-weight:500}
  .d-val.example{color:var(--green);font-size:0.88rem}
  .d-val.ex-en{color:var(--text-muted);font-style:italic;font-size:0.76rem}
  .d-sep{border:none;border-top:1px solid var(--border);margin:0}
  .empty{display:none;text-align:center;padding:80px 32px;direction:ltr}
  .empty.show{display:flex;flex-direction:column;align-items:center;gap:10px}
  .empty-icon{font-size:1.8rem;opacity:0.25}
  .empty-text{font-family:var(--font);font-size:0.85rem;color:var(--text-muted)}
  .bottom{position:fixed;bottom:0;left:0;right:0;background:rgba(16,16,16,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:9px 18px calc(9px + env(safe-area-inset-bottom));display:flex;gap:8px;justify-content:center;align-items:center;direction:ltr}
  .bottom-btn{font-family:var(--font);font-size:0.7rem;font-weight:500;color:var(--text-muted);background:transparent;border:1px solid var(--border-light);padding:6px 14px;border-radius:18px;cursor:pointer;transition:color 0.15s,border-color 0.15s;display:flex;align-items:center;gap:5px}
  @media(hover:hover){.bottom-btn:hover{border-color:rgba(255,255,255,0.15);color:var(--text-dim)}}
  .bottom-btn:active{transform:scale(0.96)}
  .bottom-btn.danger{color:#555}
  @media(hover:hover){.bottom-btn.danger:hover{color:#f87171;border-color:rgba(248,113,113,0.25)}}
  @media(min-width:600px){
    .list,.header,.search-wrap,.bottom{max-width:540px;margin-left:auto;margin-right:auto}
  }
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-mark">ע</div>
      <span class="logo-text">Hebrew Vocab</span>
    </div>
    <div class="header-actions">
      <button class="h-btn" id="showall-btn" onclick="toggleAllDetail()">Expand all</button>
      <button class="h-btn" id="ca" onclick="copyAll()">Copy all</button>
      <button class="h-btn" id="cu" onclick="copyUnchecked()">Copy left</button>
      <span class="counter" id="hcount"></span>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="pbar" style="width:0%"></div></div>
  </div>
  <div class="filters">
    <button class="ftab active" data-f="all">All</button>
    <button class="ftab" data-f="unseen">Learning</button>
    <button class="ftab" data-f="known">Known</button>
  </div>
</div>
<div class="search-wrap">
  <div class="search-container">
    <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search-box" id="searchInput" type="text" placeholder="Search word, meaning, or example..." autocomplete="off" spellcheck="false">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
  </div>
</div>
<div class="list" id="list"></div>
<div class="empty" id="empty">
  <div class="empty-icon">📭</div>
  <div class="empty-text">Nothing here yet.</div>
</div>
<div class="bottom">
  <button class="bottom-btn" onclick="shuffleList()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
    Shuffle
  </button>
  <button class="bottom-btn" id="resetOrderBtn" onclick="resetOrder()" style="display:none">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
    Reset order
  </button>
  <button class="bottom-btn danger" onclick="doReset()">Reset progress</button>
</div>

let checked={},filter='all',openD={},searchTerm='',isShuffled=false;
let displayOrder=V.map((_,i)=>i);

function save(){try{localStorage.setItem('hv3',JSON.stringify(checked))}catch(e){}}
function load(){try{const d=localStorage.getItem('hv3');if(d)checked=JSON.parse(d)}catch(e){}}

function getRows(){
  let data=displayOrder.map(i=>V[i]);
  if(filter==='known')data=data.filter(v=>checked[v[0]]);
  else if(filter==='unseen')data=data.filter(v=>!checked[v[0]]);
  if(searchTerm){
    const q=searchTerm.toLowerCase();
    data=data.filter(v=>v[1].includes(q)||v[4].toLowerCase().includes(q)||v[5].includes(q)||v[6].toLowerCase().includes(q));
  }
  return data;
}

function render(){
  const list=document.getElementById('list');
  const empty=document.getElementById('empty');
  const data=getRows();
  if(!data.length){
    list.innerHTML='';
    empty.classList.add('show');
  } else {
    empty.classList.remove('show');
    const frag=document.createDocumentFragment();
    data.forEach((v)=>{
      const[id,word,pos,root,meaning,example,exMeaning]=v;
      const c=!!checked[id],o=!!openD[id];
      const item=document.createElement('div');
      item.className='item'+(c?' checked':'');
      item.id='item'+id;
      item.innerHTML='<div class="row">'+
        '<button class="expand-btn'+(o?' open':'')+'" data-eid="'+id+'">▾</button>'+
        '<div class="circle" data-id="'+id+'">'+
          '<svg class="ck" width="13" height="10" viewBox="0 0 13 10" fill="none">'+
            '<path d="M1.5 5L5 8.5L11.5 1.5" stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>'+
          '</svg>'+
        '</div>'+
        '<div class="word-area">'+
          '<span class="word">'+word+'</span>'+
          '<span class="pos-tag">'+pos+'</span>'+
        '</div>'+
      '</div>'+
      '<div class="detail'+(o?' open':'')+'" id="det'+id+'">'+
        '<div class="detail-inner"><div class="detail-card">'+
          '<div class="d-row">'+
            '<span class="d-label">Meaning</span>'+
            '<span class="d-val meaning">'+meaning+'</span>'+
          '</div>'+
          '<hr class="d-sep">'+
          '<div class="d-row">'+
            '<span class="d-label">Example</span>'+
            '<span class="d-val example">'+example+'</span>'+
          '</div>'+
          '<div class="d-row">'+
            '<span class="d-label"></span>'+
            '<span class="d-val ex-en">'+exMeaning+'</span>'+
          '</div>'+
        '</div></div>'+
      '</div>';
      frag.appendChild(item);
    });
    list.innerHTML='';
    list.appendChild(frag);
  }
  updateCounter();
}

function updateCounter(){
  const cnt=Object.values(checked).filter(Boolean).length;
  const pct=Math.round((cnt/V.length)*100);
  document.getElementById('hcount').textContent=cnt+' / '+V.length;
  document.getElementById('pbar').style.width=pct+'%';
}

function togCheck(id){
  checked[id]=!checked[id];
  if(!checked[id])delete checked[id];
  save();
  if(filter!=='all'){render();return}
  const el=document.getElementById('item'+id);
  if(el)el.classList.toggle('checked',!!checked[id]);
  updateCounter();
}

function togDetail(id){
  openD[id]=!openD[id];
  const det=document.getElementById('det'+id);
  const btn=document.querySelector('[data-eid="'+id+'"]');
  if(det)det.classList.toggle('open',!!openD[id]);
  if(btn)btn.classList.toggle('open',!!openD[id]);
}

document.getElementById('list').addEventListener('click',function(e){
  var circle=e.target.closest('.circle');
  if(circle){togCheck(+circle.dataset.id);return}
  var ebtn=e.target.closest('.expand-btn');
  if(ebtn){e.stopPropagation();togDetail(+ebtn.dataset.eid);return}
  var wordArea=e.target.closest('.word-area');
  if(wordArea){
    var item=wordArea.closest('.item');
    if(item)togDetail(+item.id.replace('item',''));
  }
});

document.querySelector('.filters').addEventListener('click',function(e){
  var tab=e.target.closest('.ftab');
  if(!tab)return;
  filter=tab.dataset.f;
  document.querySelectorAll('.ftab').forEach(function(t){t.classList.remove('active')});
  tab.classList.add('active');
  render();
});

var searchInput=document.getElementById('searchInput');
var searchClear=document.getElementById('searchClear');
var searchDebounce;
searchInput.addEventListener('input',function(){
  clearTimeout(searchDebounce);
  searchDebounce=setTimeout(function(){
    searchTerm=searchInput.value.trim();
    searchClear.classList.toggle('show',searchTerm.length>0);
    render();
  },120);
});
function clearSearch(){
  searchInput.value='';searchTerm='';
  searchClear.classList.remove('show');render();
}

function toggleAllDetail(){
  var allOpen=V.every(function(v){return openD[v[0]]});
  V.forEach(function(v){openD[v[0]]=!allOpen});
  document.getElementById('showall-btn').textContent=allOpen?'Expand all':'Collapse all';
  render();
}

function shuffleList(){
  for(var i=displayOrder.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var tmp=displayOrder[i];displayOrder[i]=displayOrder[j];displayOrder[j]=tmp;
  }
  isShuffled=true;
  document.getElementById('resetOrderBtn').style.display='flex';
  render();
}

function resetOrder(){
  displayOrder=V.map(function(_,i){return i});
  isShuffled=false;
  document.getElementById('resetOrderBtn').style.display='none';
  render();
}

function doReset(){
  if(confirm('Reset all progress? This cannot be undone.')){
    checked={};save();render();
  }
}

function copyAll(){
  var t=V.map(function(v){return v[1]+' — '+v[4]}).join('\n');
  navigator.clipboard.writeText(t).then(function(){flash('ca','Copied','Copy all')});
}
function copyUnchecked(){
  var t=V.filter(function(v){return !checked[v[0]]}).map(function(v){return v[1]+' — '+v[4]}).join('\n');
  navigator.clipboard.writeText(t).then(function(){flash('cu','Copied','Copy left')});
}
function flash(id,on,off){
  var b=document.getElementById(id);
  b.textContent=on;b.classList.add('flash');
  setTimeout(function(){b.textContent=off;b.classList.remove('flash')},1800);
}

load();render();
</script>
