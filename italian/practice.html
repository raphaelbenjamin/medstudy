<style>
/* ── Site layout tokens ── */
:root{
  --bg:#0c0c0e;--bg-card:#141417;--bg-hover:#1b1b1f;
  --bg-overlay:rgba(0,0,0,.65);
  --border:#22222a;--border-sub:#1a1a22;
  --text-1:#f0f0f4;--text-2:#8a8a96;--text-3:#50505c;
  --blue:#3b82f6;--blue-dim:rgba(59,130,246,.14);
  --shadow:0 4px 24px rgba(0,0,0,.45);
  --shadow-sm:0 2px 10px rgba(0,0,0,.35);
  --r:14px;--r-sm:9px;
  --font:'Inter',system-ui,-apple-system,sans-serif;
  --mono:'JetBrains Mono','Fira Code',monospace;
}
[data-theme="light"]{
  --bg:#f5f5f7;--bg-card:#fff;--bg-hover:#eaeaee;
  --bg-overlay:rgba(0,0,0,.35);
  --border:#dddde8;--border-sub:#e8e8f0;
  --text-1:#111118;--text-2:#55555e;--text-3:#9090a0;
  --shadow:0 4px 24px rgba(0,0,0,.08);--shadow-sm:0 2px 10px rgba(0,0,0,.06);
}
html{font-size:16px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--text-1);font-family:var(--font);
     line-height:1.65;-webkit-font-smoothing:antialiased;
     transition:background .2s,color .2s}
a{color:inherit;text-decoration:none}

/* ── Sidebar ── */
.sb{
  width:210px;flex-shrink:0;padding:28px 12px 32px 18px;
  border-right:1px solid var(--border-sub);
  position:sticky;top:0;height:100vh;overflow-y:auto;
  background:var(--bg);display:flex;flex-direction:column;gap:0;
  transition:transform .25s ease,background .2s;z-index:100;
}
.sb-logo{
  width:30px;height:30px;border-radius:8px;
  background:linear-gradient(135deg,#3b82f6,#8b5cf6);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:.8rem;color:#fff;margin-bottom:24px;flex-shrink:0;
}
.sb-logo:hover{opacity:.85}
.sb-label{font-size:.65rem;font-weight:600;color:var(--text-3);
  text-transform:uppercase;letter-spacing:.12em;padding:0 10px;margin-bottom:4px;display:block}
.sb-nav{list-style:none;display:flex;flex-direction:column;gap:2px;margin-bottom:16px}
.sb-nav a{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r-sm);
  font-size:.9rem;color:var(--text-2);transition:background .12s,color .12s}
.sb-nav a:hover{background:var(--bg-hover);color:var(--text-1)}
.sb-nav a.active{color:var(--text-1);background:var(--bg-hover);font-weight:500}
.sb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:var(--text-3);transition:background .12s}
.sb-nav a.active .sb-dot,.sb-nav a:hover .sb-dot{background:currentColor}
.sb-spacer{flex:1}
.sb-theme{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r-sm);
  font-size:.85rem;color:var(--text-2);cursor:pointer;background:none;border:none;
  font-family:var(--font);width:100%;transition:background .12s,color .12s}
.sb-theme:hover{background:var(--bg-hover);color:var(--text-1)}
.sb-theme-icon{font-size:1rem;line-height:1;width:18px;text-align:center}

/* ── Mobile ── */
.sb-overlay{display:none;position:fixed;inset:0;background:var(--bg-overlay);z-index:90;
  opacity:0;pointer-events:none;transition:opacity .25s}
.sb-overlay.open{opacity:1;pointer-events:all}
.mob-header{display:none;position:sticky;top:0;z-index:80;height:52px;padding:0 16px;
  background:var(--bg);border-bottom:1px solid var(--border-sub);
  align-items:center;justify-content:space-between;transition:background .2s}
.mob-logo{width:28px;height:28px;border-radius:7px;
  background:linear-gradient(135deg,#3b82f6,#8b5cf6);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:.75rem;color:#fff}
.mob-right{display:flex;align-items:center;gap:8px}
.mob-theme-btn,.ham-btn{width:34px;height:34px;border-radius:var(--r-sm);
  background:var(--bg-card);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:.9rem;transition:background .12s,border-color .12s}
.mob-theme-btn:hover,.ham-btn:hover{background:var(--bg-hover)}

/* ── Layout ── */
.layout{display:flex;min-height:100vh}
.main{flex:1;min-width:0;padding:40px 40px 80px}

/* ── Responsive ── */
@media(max-width:820px){
  .main{padding:20px 16px 80px}
  .sb{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);box-shadow:var(--shadow)}
  .sb.open{transform:translateX(0)}
  .sb-overlay{display:block}
  .mob-header{display:flex}
  .layout{flex-direction:column}
}
@media(min-width:821px){
  .mob-header{display:none}
  .sb-overlay{display:none !important}
}

/* ── Override original bg/body so it inherits site theme ── */
.main-inner{background:transparent!important}
</style>

<style>
/* ── App styles (original) ── */

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #181a22;
    --surface2: #1e2028;
    --border: #2a2d38;
    --text: #e2e4ea;
    --text-dim: #7a7e8c;
    --text-faint: #4a4e5c;
    --accent-it: #5b8fd9;
    --accent-es: #d4845a;
    --accent-speech: #6bc77a;
    --accent-batch2: #b57bee;
    --accent-active: var(--accent-it);
    --copy-bg: #252830;
    --copy-hover: #2e3140;
    --toast-bg: #2e3140;
  }

  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 780px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  h1 {
    font-size: 1.75rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    margin-bottom: 6px;
  }

  .subtitle {
    color: var(--text-dim);
    font-size: 0.875rem;
    margin-bottom: 32px;
  }

  /* ---- TABS ---- */
  .tab-bar {
    display: flex;
    gap: 4px;
    margin-bottom: 8px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0;
  }

  .tab {
    padding: 10px 20px;
    font-family: inherit;
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--text-dim);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
    position: relative;
    bottom: -1px;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--accent-active); }

  .tab[data-tab="italian"] { --tab-accent: var(--accent-it); }
  .tab[data-tab="spanish"] { --tab-accent: var(--accent-es); }
  .tab[data-tab="speech"] { --tab-accent: var(--accent-speech); }
  .tab[data-tab="batch2"] { --tab-accent: var(--accent-batch2); }
  .tab.active { border-bottom-color: var(--tab-accent); }

  /* ---- COPY ALL ---- */
  .top-actions {
    display: flex;
    justify-content: flex-end;
    padding: 16px 0 8px;
  }

  .btn-copy {
    font-family: inherit;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text-dim);
    background: var(--copy-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .btn-copy:hover { background: var(--copy-hover); color: var(--text); }
  .btn-copy.copied { color: #6bc77a; border-color: #3a5c40; }

  .btn-copy svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

  /* ---- CONTENT ---- */
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .section-block {
    margin-bottom: 32px;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--accent-active);
    letter-spacing: -0.01em;
  }

  [data-tab-content="italian"] .section-title { color: var(--accent-it); }
  [data-tab-content="spanish"] .section-title { color: var(--accent-es); }
  [data-tab-content="speech"] .section-title { color: var(--accent-speech); }
  [data-tab-content="batch2"] .section-title { color: var(--accent-batch2); }

  .sentence-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    padding: 8px 0;
    border-bottom: 1px solid #1c1e26;
    font-size: 0.875rem;
    transition: background 0.1s;
  }

  .sentence-row:hover {
    background: var(--surface);
    margin: 0 -12px;
    padding: 8px 12px;
    border-radius: 6px;
  }

  .sentence-row:last-child { border-bottom: none; }

  .lang-text { color: var(--text); }
  .eng-text { color: var(--text-dim); font-style: italic; }

  /* ---- TOC ---- */
  .toc {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 24px;
    font-size: 0.8rem;
  }

  .toc-title {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 10px;
  }

  .toc-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 3px 16px;
  }

  .toc-link {
    color: var(--text-dim);
    text-decoration: none;
    padding: 3px 0;
    display: block;
    transition: color 0.15s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .toc-link:hover { color: var(--text); }

  /* ---- TOAST ---- */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--toast-bg);
    color: #6bc77a;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 500;
    opacity: 0;
    pointer-events: none;
    transition: all 0.25s ease;
    border: 1px solid #3a5c40;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ---- RESPONSIVE ---- */
  @media (max-width: 600px) {
    .container { padding: 24px 16px 60px; }
    h1 { font-size: 1.4rem; }
    .sentence-row { grid-template-columns: 1fr; gap: 2px; }
    .tab { padding: 8px 14px; font-size: 0.8rem; }
  }

/* ── Dark mode override: force app bg transparent so site theme shows ── */
body { background: var(--bg) !important; color: var(--text) !important; }
[data-theme="light"] body { --bg: #f5f5f7; --surface: #ffffff; --surface2: #f0f0f5; --border: #dddde8; --text: #111118; --text-dim: #55555e; --text-faint: #9090a0; }
.container { padding-top: 24px; }
</style>
</head>

<script>
const data = {
  italian: {
    "SECTION 01 — Ce la faccio / Non ce la faccio (I can handle it / I can't take it)": [
      ["Non ce la faccio più.", "I can't take it anymore."],
      ["Ce la fai a venire domani?", "Can you make it tomorrow?"],

      ["Dai, ce la fai, manca poco.", "Come on, you can do it, almost there."],
      ["Ce l'abbiamo fatta per un pelo.", "We made it by a hair."]
    ],
    "SECTION 02 — Mi va / Non mi va di (I feel like / I don't feel like)": [
      ["Non mi va di uscire stasera.", "I don't feel like going out tonight."],
      ["Ti va di prendere un caffè?", "Do you feel like getting a coffee?"],
      ["Non mi va di cucinare.", "I don't feel like cooking."],
      ["Ti va un gelato?", "Do you feel like an ice cream?"],
      ["Non mi va di parlarne adesso.", "I don't feel like talking about it now."],
      ["Non mi va proprio, scusa.", "I really don't feel like it, sorry."],
      ["Ti va di fare due passi?", "Do you feel like going for a walk?"],
      ["Non mi andava di restare.", "I didn't feel like staying."],
      ["Se ti va, possiamo vederci dopo.", "If you're up for it, we can meet later."],
      ["Non mi va mai di fare niente il lunedì.", "I never feel like doing anything on Mondays."]

    "SECTION 03 — Mi sa che (I think / I reckon)": [
      ["Mi sa che pioverà.", "I think it's going to rain."],
      ["Mi sa che ha ragione.", "I reckon he's right."],
      ["Mi sa che non ce la faccio.", "I don't think I can make it."],
      ["Mi sa che abbiamo sbagliato strada.", "I think we went the wrong way."],
      ["Mi sa che è meglio così.", "I think it's better this way."],
      ["Mi sa che non viene nessuno.", "I don't think anyone's coming."],

      ["Mi sa che l'ho lasciato a casa.", "I think I left it at home."],
      ["Mi sa che hanno chiuso.", "I think they closed."],
      ["Mi sa che ti sei sbagliato.", "I think you got it wrong."]

    "SECTION 04 — Magari (maybe / I wish / if only)": [
      ["Magari ci andiamo domani.", "Maybe we'll go tomorrow."],
      ["Magari fosse così semplice!", "If only it were that simple!"],
      ["Magari la prossima volta.", "Maybe next time."],
      ["— Vuoi venire? — Magari!", "— Want to come? — I wish!"],
      ["Magari mi sbaglio, ma...", "Maybe I'm wrong, but..."],
      ["Magari potremmo trovare un compromesso.", "Maybe we could find a compromise."],
      ["Magari avessi più tempo!", "If only I had more time!"],
      ["Magari prova a chiedere a lui.", "Maybe try asking him."],
      ["Magari possiamo parlarne dopo.", "Maybe we can talk about it later."],
      ["Magari avessi i soldi per farlo.", "If only I had the money to do it."]

    "SECTION 05 — Ci vuole / Ci vogliono / Ci metto (it takes)": [
      ["Ci vuole pazienza.", "It takes patience."],
      ["Ci metto mezz'ora per arrivare.", "It takes me half an hour to get there."],

// ---- RENDER ----
function renderTab(tabId) {
  const container = document.getElementById(tabId);
  const actionsDiv = container.querySelector('.top-actions');
  const sections = data[tabId];

  // Build TOC
  const toc = document.createElement('div');
  toc.className = 'toc';
  const tocTitle = document.createElement('div');
  tocTitle.className = 'toc-title';
  tocTitle.textContent = 'Jump to section';
  toc.appendChild(tocTitle);
  const tocGrid = document.createElement('div');
  tocGrid.className = 'toc-grid';
  toc.appendChild(tocGrid);
  container.insertBefore(toc, actionsDiv);

  for (const [title, pairs] of Object.entries(sections)) {
    // TOC entry
    const anchor = 'sec-' + tabId + '-' + title.replace(/[^a-zA-Z0-9]/g, '-').slice(0, 40);
    const tocLink = document.createElement('a');
    tocLink.className = 'toc-link';
    tocLink.href = '#' + anchor;
    // Show just a short label: grab content between em dashes or first part
    const label = title.replace(/^SECTION \d+\s*[—–-]\s*/i, '');
    tocLink.textContent = title.match(/^SECTION \d+/i)?.[0] + ' · ' + label;
    tocLink.onclick = (e) => {
      e.preventDefault();
      document.getElementById(anchor)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    };
    tocGrid.appendChild(tocLink);

    const block = document.createElement('div');
    block.className = 'section-block';
    block.id = anchor;

    const header = document.createElement('div');
    header.className = 'section-header';

    const h3 = document.createElement('span');
    h3.className = 'section-title';
    h3.textContent = title;

    const copyBtn = document.createElement('button');
    copyBtn.className = 'btn-copy';
    copyBtn.innerHTML = `<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>Copy`;
    copyBtn.onclick = () => copySection(title, pairs, copyBtn);

    header.appendChild(h3);
    header.appendChild(copyBtn);
    block.appendChild(header);

    for (const [lang, eng] of pairs) {
      const row = document.createElement('div');
      row.className = 'sentence-row';
      row.innerHTML = `<span class="lang-text">${lang}</span><span class="eng-text">${eng}</span>`;
      block.appendChild(row);
    }

    container.appendChild(block);
  }
}

function switchTab(tabId) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${tabId}"]`).classList.add('active');
  document.getElementById(tabId).classList.add('active');
}

function formatForCopy(sections) {
  let text = '';
  for (const [title, pairs] of Object.entries(sections)) {
    text += title + '\n';
    for (const [lang, eng] of pairs) {
      text += `${lang}  |  ${eng}\n`;
    }
    text += '\n';
  }
  return text.trim();
}

function formatSectionForCopy(title, pairs) {
  let text = title + '\n';
  for (const [lang, eng] of pairs) {
    text += `${lang}  |  ${eng}\n`;
  }
  return text.trim();
}

function copyAll(tabId) {
  const text = formatForCopy(data[tabId]);
  navigator.clipboard.writeText(text).then(() => showToast('All sentences copied!'));
}

function copySection(title, pairs, btn) {
  const text = formatSectionForCopy(title, pairs);
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add('copied');
    btn.innerHTML = `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Copied`;
    showToast('Section copied!');
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>Copy`;
    }, 2000);
  });
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1800);
}

      ["Smettila di cercare motivazione e inizia a fare.", "Stop looking for motivation and start doing."],
      ["La gente si arrende troppo in fretta.", "People give up too quickly."],
      ["Se non è veloce, dicono 'non fa per me'.", "If it's not fast, they say 'it's not for me'."],
      ["Devi spedire. Devi mandare fuori le cose. Basta pensare.", "You have to ship it. Put things out. Enough thinking."],
      ["Sii tu quello che crea l'energia nella stanza.", "Be the one who creates the energy in the room."]
    ],
    "SECTION 09 — Being Real vs. Being Fake": [
      ["La gente finge di avere tutto sotto controllo.", "People pretend to have everything under control."],
      ["Non puoi vivere nascondendoti per sempre.", "You can't live hiding forever."],
      ["Se non mostri la faccia, non sei davvero presente.", "If you don't show your face, you're not truly present."],
      ["Tanti si nascondono dietro la disciplina per non vivere.", "A lot of people hide behind discipline to avoid living."],
      ["È più facile dire 'sono nichilista' che fare qualcosa.", "It's easier to say 'I'm nihilistic' than to do something."],
      ["La gente usa la routine per sentirsi in controllo.", "People use routine to feel in control."],
      ["Ma il controllo è un'illusione.", "But control is an illusion."],
      ["Devi lasciar andare il bisogno di avere tutto chiaro.", "You have to let go of needing to have everything figured out."],
      ["La gente si mette addosso una maschera e ci si abitua.", "People put on a mask and get used to it."],
      ["Non puoi essere una forza nel mondo se nessuno sa chi sei.", "You can't be a force in the world if nobody knows who you are."],
      ["Fai vedere chi sei davvero, smettila di nasconderti.", "Show who you really are, stop hiding."]
    ],
    "SECTION 10 — Connecting with People": [
      ["È difficile connettersi con qualcuno che non vive davvero.", "It's hard to connect with someone who doesn't truly live."],
      ["Non riesci a parlare con qualcuno che non ha niente da dire.", "You can't even talk to someone who has nothing to say."],
      ["La gente ripete sempre le stesse cose, le stesse lamentele.", "People always repeat the same things, the same complaints."],
      ["Ti connetti con chi sta affrontando qualcosa di vero.", "You connect with people who are dealing with something real."],
      ["Non c'è passione, non c'è entusiasmo in quello che dicono.", "There's no passion, no excitement in what they say."],
      ["Il ragazzo medio non ha nemmeno un hobby che lo appassiona.", "The average guy doesn't even have a hobby he's passionate about."],
      ["Parli con la gente e senti sempre le stesse frasi fatte.", "You talk to people and you always hear the same clichés."],
      ["La vita quotidiana ha perso il suo incanto per tanti.", "Daily life has lost its enchantment for many."],
      ["La gente aspetta che qualcuno la porti fuori, la inviti.", "People wait for someone to take them out, to invite them."],
      ["Se non hai energia da dare, nessuno vorrà starti intorno.", "If you have no energy to give, nobody will want to be around you."]
    ],
    "SECTION 11 — Being a Force": [
      ["Devi guardarti allo specchio e dirti che sei qui per un motivo.", "You need to look in the mirror and tell yourself you're here for a reason."],
      ["Sei una forza, ma il mondo ti ha convinto del contrario.", "You're a force, but the world convinced you otherwise."],
      ["Devi diventare un'icona per te stesso.", "You have to become an icon for yourself."],
      ["Guardati allo specchio e chiediti: sono ispirato dalla mia vita?", "Look in the mirror and ask yourself: am I inspired by my life?"],
      ["Il mondo ti mette addosso un sacco di roba — scrollatela di dosso.", "The world piles stuff on you — shake it off."],
      ["Non lasciare che la depressione ti faccia dimenticare chi sei.", "Don't let depression make you forget who you are."],
      ["Sei qui, sei vivo, sei in salute — questo conta.", "You're here, you're alive, you're healthy — that matters."],
      ["La nebbia ti fa sentire piccolo, ma non lo sei.", "The fog makes you feel small, but you're not."],
      ["Devi toglierti di dosso quel mantello di nichilismo.", "You have to take off that coat of nihilism."],
      ["Tutto il resto è solo un modo per anestetizzarsi.", "Everything else is just a way to numb yourself."]
    ],
    "SECTION 12 — Craft, Mastery & Showing Up": [
      ["Devi trovare qualcosa su cui lavorare ogni singolo giorno.", "You need to find something to work on every single day."],
      ["Non tutti i giorni devono essere entusiasmanti.", "Not every day has to be exciting."],
      ["Ci vuole pazienza per sviluppare qualcosa di vero.", "It takes patience to develop something real."],
      ["La gente salta da una cosa all'altra senza mai approfondire.", "People jump from one thing to the next without ever going deep."],
      ["La monotonia va bene se è al servizio di qualcosa.", "Monotony is fine if it serves something."],
      ["Devi fare i lavori di merda. Devi affrontare l'imbarazzo.", "You have to do the crappy jobs. You have to face embarrassment."],
      ["Non c'è maestria senza ripetizione.", "There's no mastery without repetition."],
      ["La gente vuole la velocità, ma la velocità non paga mai.", "People want speed, but speed never pays off."],
      ["Devi sporcarti le mani, non basta leggere.", "You have to get your hands dirty, reading isn't enough."],
      ["Trova qualcosa e armeggiaci ogni giorno.", "Find something and tinker with it every day."],
      ["Il punto è presentarsi, ogni giorno, anche quando non hai voglia.", "The point is showing up, every day, even when you don't feel like it."]
    ]

// ---- RENDER ----
function renderTab(tabId) {
  const container = document.getElementById(tabId);
  const actionsDiv = container.querySelector('.top-actions');
  const sections = data[tabId];

  // Build TOC
  const toc = document.createElement('div');
  toc.className = 'toc';
  const tocTitle = document.createElement('div');
  tocTitle.className = 'toc-title';
  tocTitle.textContent = 'Jump to section';
  toc.appendChild(tocTitle);
  const tocGrid = document.createElement('div');
  tocGrid.className = 'toc-grid';
  toc.appendChild(tocGrid);
  container.insertBefore(toc, actionsDiv);

  for (const [title, pairs] of Object.entries(sections)) {
    // TOC entry
    const anchor = 'sec-' + tabId + '-' + title.replace(/[^a-zA-Z0-9]/g, '-').slice(0, 40);
    const tocLink = document.createElement('a');
    tocLink.className = 'toc-link';
    tocLink.href = '#' + anchor;
    // Show just a short label: grab content between em dashes or first part
    const label = title.replace(/^SECTION \d+\s*[—–-]\s*/i, '');
    tocLink.textContent = title.match(/^SECTION \d+/i)?.[0] + ' · ' + label;
    tocLink.onclick = (e) => {
      e.preventDefault();
      document.getElementById(anchor)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    };
    tocGrid.appendChild(tocLink);

    const block = document.createElement('div');
    block.className = 'section-block';
    block.id = anchor;

    const header = document.createElement('div');
    header.className = 'section-header';

    const h3 = document.createElement('span');
    h3.className = 'section-title';
    h3.textContent = title;

    const copyBtn = document.createElement('button');
    copyBtn.className = 'btn-copy';
    copyBtn.innerHTML = `<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>Copy`;
    copyBtn.onclick = () => copySection(title, pairs, copyBtn);

    header.appendChild(h3);
    header.appendChild(copyBtn);
    block.appendChild(header);

    for (const [lang, eng] of pairs) {
      const row = document.createElement('div');
      row.className = 'sentence-row';
      row.innerHTML = `<span class="lang-text">${lang}</span><span class="eng-text">${eng}</span>`;
      block.appendChild(row);
    }

    container.appendChild(block);
  }
}

function switchTab(tabId) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${tabId}"]`).classList.add('active');
  document.getElementById(tabId).classList.add('active');
}

function formatForCopy(sections) {
  let text = '';
  for (const [title, pairs] of Object.entries(sections)) {
    text += title + '\n';
    for (const [lang, eng] of pairs) {
      text += `${lang}  |  ${eng}\n`;
    }
    text += '\n';
  }
  return text.trim();
}

function formatSectionForCopy(title, pairs) {
  let text = title + '\n';
  for (const [lang, eng] of pairs) {
    text += `${lang}  |  ${eng}\n`;
  }
  return text.trim();
}

function copyAll(tabId) {
  const text = formatForCopy(data[tabId]);
  navigator.clipboard.writeText(text).then(() => showToast('All sentences copied!'));
}

function copySection(title, pairs, btn) {
  const text = formatSectionForCopy(title, pairs);
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add('copied');
    btn.innerHTML = `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Copied`;
    showToast('Section copied!');
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>Copy`;
    }, 2000);
  });
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1800);
}

// Init
renderTab('italian');
renderTab('spanish');
renderTab('speech');
renderTab('batch2');

</script>

<script>
(function(){
  var root=document.documentElement;
  var saved=localStorage.getItem('msTheme')||'dark';
  root.dataset.theme=saved;
  function updateIcons(){
    var isDark=root.dataset.theme==='dark';
    document.querySelectorAll('.sb-theme-icon,.mob-theme-icon').forEach(function(el){
      el.textContent=isDark?'☀':'🌙';
    });
  }
  window.toggleTheme=function(){
    root.dataset.theme=root.dataset.theme==='dark'?'light':'dark';
    localStorage.setItem('msTheme',root.dataset.theme);
    updateIcons();
  };
  updateIcons();
  window.addEventListener('DOMContentLoaded',function(){
    updateIcons();
    var sb=document.querySelector('.sb');
    var overlay=document.querySelector('.sb-overlay');
    var hamBtn=document.querySelector('.ham-btn');
    if(!sb||!overlay||!hamBtn)return;
    function openSb(){sb.classList.add('open');overlay.classList.add('open');}
    function closeSb(){sb.classList.remove('open');overlay.classList.remove('open');}
    hamBtn.addEventListener('click',function(){sb.classList.contains('open')?closeSb():openSb();});
    overlay.addEventListener('click',closeSb);
    document.querySelectorAll('.sb-nav a').forEach(function(a){a.addEventListener('click',closeSb);});
  });
})();
</script>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('../sw.js').catch(function(){});}
</script>
