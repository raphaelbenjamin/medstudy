<p>The bacterial capsule is a polysaccharide layer that prevents phagocytosis — it's the virulence factor for encapsulated organisms (Strep pneumoniae, N. meningitidis, H. influenzae, Klebsiella, group B strep, Cryptococcus). Asplenic patients are at high risk because the spleen is responsible for clearing encapsulated organisms. Endospores are formed by Bacillus and Clostridium species — they're highly resistant to heat, chemicals, radiation, and desiccation. They allow the organism to survive in harsh environments and germinate when conditions are favorable. Autoclaving at 121°C for 15 minutes under pressure is required to kill endospores.</p>`

// Build the page
const contentEl = document.getElementById('content');
const tocEl = document.getElementById('toc');
let cardId = 0;
const sections = {};

DATA.forEach(group => {
  const sKey = group.section;
  if (!sections[sKey]) sections[sKey] = [];
  sections[sKey].push(group);
});

// Build TOC
Object.entries(sections).forEach(([secName, groups]) => {
  const tocSec = document.createElement('div');
  tocSec.className = 'toc-section';
  tocSec.innerHTML = `<div class="toc-section-title">${secName}</div><div class="toc-links"></div>`;
  const linksEl = tocSec.querySelector('.toc-links');
  groups.forEach(g => {
    g.items.forEach(item => {
      const a = document.createElement('a');
      a.className = 'toc-link';
      a.textContent = item.name.length > 40 ? item.name.slice(0, 38) + '…' : item.name;
      a.onclick = () => {
        const el = document.getElementById('card-' + item._id);
        if (el) {
          el.classList.add('open');
          el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      };
      linksEl.appendChild(a);
    });
  });
  tocEl.appendChild(tocSec);
});

// Build content
let lastSection = '';
let lastSub = '';
DATA.forEach(group => {
  if (group.section !== lastSection) {
    lastSection = group.section;
    const sec = document.createElement('div');
    sec.className = 'main-section';
    sec.innerHTML = `<h2 class="main-section-title">${group.section}</h2>`;
    contentEl.appendChild(sec);
  }
  if (group.subsection !== lastSub) {
    lastSub = group.subsection;
    const sub = document.createElement('div');
    sub.className = 'subsection-title';
    sub.textContent = group.subsection;
    contentEl.appendChild(sub);
  }
  group.items.forEach(item => {
    item._id = cardId++;
    const stars = '★'.repeat(item.stars);
    const tagLabel = group.tag;
    const card = document.createElement('div');
    card.className = 'card';
    card.id = 'card-' + item._id;
    card.setAttribute('data-search', (item.name + ' ' + item.body).toLowerCase());
    card.innerHTML = `
      <div class="card-header" onclick="this.parentElement.classList.toggle('open')">
        <span class="card-arrow">▶</span>
        <span class="card-name">${item.name}</span>
        ${stars ? `<span class="card-stars">${stars}</span>` : ''}
        <span class="card-tag tag-${tagLabel}">${tagLabel}</span>
      </div>
      <div class="card-body">${item.body}</div>
    `;
    contentEl.appendChild(card);
  });
});

// Search
const searchInput = document.getElementById('search');
searchInput.addEventListener('input', () => {
  const q = searchInput.value.toLowerCase().trim();
  const cards = document.querySelectorAll('.card');
  let any = false;
  cards.forEach(c => {
    const match = !q || c.getAttribute('data-search').includes(q);
    c.style.display = match ? '' : 'none';
    if (match) any = true;
  });
  document.getElementById('no-results')?.remove();
  if (!any) {
    const nr = document.createElement('div');
    nr.className = 'no-results';
    nr.id = 'no-results';
    nr.textContent = 'No pathogens match your search.';
    contentEl.appendChild(nr);
  }
});

function toggleAll(open) {
  document.querySelectorAll('.card').forEach(c => {
    if (c.style.display !== 'none') {
      open ? c.classList.add('open') : c.classList.remove('open');
    }
  });
}
</script>
